services:
  - type: web
    name: pebble-server
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm --filter @pebble/server start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ALLOWED_ORIGINS
        value: https://dumb-dumb-man.netlify.app

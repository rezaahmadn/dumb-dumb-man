name: Deploy to Netlify

on:
  workflow_dispatch:
  # AUTO-DEPLOY: this push trigger deploys on every push to main.
  # Delete these 3 lines (push: / branches: / - main) to go back to
  # manual-only (Actions tab -> Run workflow).
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: netlify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        # Build output moved with the app: dist -> apps/web/dist.
        run: npx netlify-cli@26 deploy --dir=apps/web/dist --prod
